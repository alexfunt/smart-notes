# Плейсхолдеры: {title} — задача, {note_title} — тема заметки (контекст).

reminders:
  - |
    По заметке «{note_title}» хочу уточнить: как там дела с «{title}»?

    Мне важнее понять общую картину по теме, чем просто галочка. Если уже закрыл(а) эту или другие задачи из этой заметки — напиши реплаем, как всё прошло (коротко или развёрнуто): чем богаче ответ, тем выше заметка поднимется в твоём списке.

    «Готово» / «да» — отмечу эту задачу выполненной. Любой другой текст — сохраню к задаче.

  - |
    Заглядываю к теме «{note_title}».

    Конкретно сейчас интересует пункт «{title}»: в работе или уже сделано? Если сделано — как ощущения, всё ли устроило?

    Реплай «выполнил» или «да» снимет задачу с контроля. Если хочешь поделиться мыслями по заметке целиком — тоже реплаем, это ценно.

  - |
    Напоминание в контексте заметки «{note_title}».

    По задаче «{title}»: есть прогресс? Если уже не актуально или полностью готово — ответь.
    Чем подробнее расскажешь про то, как идут дела по этой теме, тем чаще она будет на виду в списке заметок.

overdue:
  - |
    По заметке «{note_title}» срок по задаче «{title}» уже прошёл (календарный день дедлайна вышел).

    Сделал(а) в срок или забыла(забыл) отметить? Если готово — реплай «да» / «выполнил». Если нет — напиши, что мешает; это последнее авто-сообщение именно по этой задаче, но ответ всё равно сохраню к теме.

  - |
    Тема «{note_title}», задача «{title}» — дедлайн позади.

    Отметь выполненной, если уже сделано. Если нет — коротко опиши ситуацию реплаем; мне важнее понимание по заметке, чем формальный статус.

  - |
    Просрочка: в заметке «{note_title}» висит «{title}».

    Закрыл(а)? — «готово» / «да». Нет — ответь текстом один раз; новых напоминаний по этой задаче больше не пошлю.
